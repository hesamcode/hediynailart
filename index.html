<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>hediynailart</title>
    <meta name="robots" content="noindex, nofollow" />

    <script>
      (function () {
        try {
          var saved = localStorage.getItem("preferredLang");
          if (saved === "fa") return window.location.replace("/fa/");
          if (saved === "en") return window.location.replace("/en/");

          var lang = (
            navigator.language ||
            navigator.userLanguage ||
            ""
          ).toLowerCase();
          if (lang.startsWith("fa")) return window.location.replace("/fa/");
          return window.location.replace("/en/");
        } catch (e) {
          window.location.replace("/en/");
        }
      })();
    </script>

    <noscript>
      <meta http-equiv="refresh" content="0; url=/en/" />
    </noscript>
  </head>
  <body></body>
</html>
