<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Professional Nail Art Blog | hediynailart</title>
    <meta
      name="description"
      content="Educational articles, professional tips and nail care guide"
    />

    <link rel="canonical" href="https://hediynailart.ir/en/blog/" />
    <link
      rel="alternate"
      hreflang="fa"
      href="https://hediynailart.ir/fa/blog/"
    />
    <link
      rel="alternate"
      hreflang="en"
      href="https://hediynailart.ir/en/blog/"
    />

    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="Professional Nail Art Blog" />
    <meta
      property="og:description"
      content="Educational articles, professional tips and nail care guide"
    />

    <meta name="theme-color" content="#fffaf8" />
    <link rel="icon" href="/assets/images/favicon-32.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <script type="module" src="/assets/js/main.js"></script>

    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/footer.css" />
    <link rel="stylesheet" href="/assets/css/blog.css" />
    <link rel="stylesheet" href="/assets/css/fontawesome/all.min.css" />
    <link rel="stylesheet" href="/assets/fonts/inter/index.css" />
  </head>
  <body>
    <div id="app" class="app">
      <header class="page-header">
        <div class="brand-area">
          <img
            src="/assets/images/nail-logo.png"
            class="brand-logo"
            alt="Logo"
          />
          <div class="brand-meta">
            <div class="brand-title">hediynailart</div>
            <div class="brand-subtitle">Nail Art Blog</div>
          </div>
        </div>
        <div class="header-actions">
          <a href="/en/" class="soft-button">Home</a>
          <button
            id="theme-toggle"
            class="soft-button theme-toggle"
            type="button"
          >
            <i id="theme-toggle-icon" class="fa-solid fa-moon"></i>
          </button>
          <a href="/fa/blog/" class="soft-button">FA</a>
        </div>
      </header>

      <main class="page-main">
        <div class="stack">
          <section class="panel hero">
            <h1 class="hero-title">Professional Nail Art Blog</h1>
            <p class="hero-text">
              Read the latest tips, professional techniques and nail care guides
              on hediynailart blog.
            </p>
          </section>

          <section class="panel">
            <div class="section-head">
              <h2 class="panel-title">Latest Articles</h2>
              <span class="section-hint" id="posts-count"></span>
            </div>
            <div id="blog-grid" class="blog-grid">
              <div class="loading-spinner">
                <i class="fa-solid fa-spinner fa-spin"></i> Loading...
              </div>
            </div>
          </section>
        </div>
      </main>

      <footer class="page-footer">
        <div class="footer-head">
          <div class="footer-brand">
            <div class="footer-title">hediynailart</div>
            <div class="footer-note">Professional Nail Art Blog</div>
          </div>
          <button id="scroll-top" class="icon-button" type="button">
            <i class="fa-solid fa-arrow-up"></i>
          </button>
        </div>

        <div class="footer-stack">
          <section class="footer-card">
            <h3 class="footer-card-title">Contact</h3>
            <div class="footer-links">
              <a class="footer-link footer-link-phone" href="tel:09150667527">
                <i class="fa-solid fa-phone footer-icon"></i> Call
              </a>

              <a
                class="footer-link footer-link-whatsapp"
                href="https://wa.me/989150667527"
                target="_blank"
                rel="noopener"
              >
                <i class="fab fa-whatsapp footer-icon"></i> WhatsApp
              </a>

              <a
                class="footer-link footer-link-instagram"
                href="https://www.instagram.com/hediynailart"
                target="_blank"
                rel="noopener"
              >
                <i class="fab fa-instagram footer-icon"></i> Instagram
              </a>
            </div>
          </section>
        </div>
      </footer>
    </div>

    <script type="module" src="/assets/js/blog.js"></script>
  </body>
</html>
